<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting to Canvas...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 32px; text-align: center; max-width: 360px; width: 90%; }
  .bar { height: 5px; background: #E62429; border-radius: 12px 12px 0 0; margin: -32px -32px 28px; }
  p { font-size: 15px; color: #555; line-height: 1.6; }
  .error { color: #791F1F; background: #FCEBEB; padding: 12px; border-radius: 8px; font-size: 13px; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="bar"></div>
  <p id="msg">Connecting to Canvas, please wait...</p>
  <div id="error" class="error" style="display:none"></div>
</div>
<script>
const PROXY = 'https://a-igrader-ten.vercel.app/api/canvas';

async function init() {
  const params   = new URLSearchParams(window.location.search);
  const code     = params.get('code');
  const state    = params.get('state');
  const errorMsg = params.get('error');

  if (errorMsg) {
    showError('Canvas login was cancelled or failed: ' + errorMsg);
    return;
  }

  if (!code) {
    showError('No authorization code received from Canvas.');
    return;
  }

  try {
    const res  = await fetch(PROXY + '?action=exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    localStorage.setItem('canvas_token', data.access_token);

    let courseId = '';
    if (state) {
      try {
        const decoded = JSON.parse(atob(state));
        courseId = decoded.courseId || '';
      } catch(e) {}
    }
    if (courseId) localStorage.setItem('canvas_course_id', courseId);

    document.getElementById('msg').textContent = 'Connected! Loading your assignments...';
    window.location.href = '/canvasmessage.html' + (courseId ? '?courseId=' + courseId : '');

  } catch (err) {
    showError('Could not complete login: ' + err.message);
  }
}

function showError(msg) {
  document.getElementById('msg').textContent = 'Something went wrong.';
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

init();
</script>
</body>
</html>
