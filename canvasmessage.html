<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Student Widget</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; padding: 12px; }

  .widget { max-width: 520px; background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; }
  .top-bar { height: 5px; background: #E62429; }
  .body { padding: 20px 22px; }

  /* Setup screen */
  .setup-title { font-size: 16px; font-weight: 500; color: #111; margin-bottom: 4px; }
  .setup-sub { font-size: 13px; color: #888; margin-bottom: 18px; line-height: 1.5; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #111; outline: none; }
  .field input:focus { border-color: #E62429; }
  .field .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
  .btn-connect { width: 100%; padding: 10px; background: #E62429; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .btn-connect:hover { background: #c4151a; }
  .setup-error { background: #FCEBEB; color: #791F1F; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-top: 12px; }

  /* Widget content */
  .greeting { font-size: 20px; font-weight: 500; color: #111; margin-bottom: 3px; }
  .subline { font-size: 13px; color: #888; margin-bottom: 20px; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #999; margin-bottom: 8px; }
  .block { margin-bottom: 18px; }

  .item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; }
  .item:last-child { margin-bottom: 0; }
  .item-missing  { background: #FCEBEB; }
  .item-upcoming { background: #FAEEDA; }
  .item-good     { background: #EAF3DE; }

  .item-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .item-missing  .item-title { color: #791F1F; }
  .item-upcoming .item-title { color: #633806; }
  .item-good     .item-title { color: #27500A; }

  .item-meta { font-size: 12px; }
  .item-missing  .item-meta { color: #A32D2D; }
  .item-upcoming .item-meta { color: #854F0B; }
  .item-good     .item-meta { color: #3B6D11; }

  .icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }

  .note { font-size: 13px; color: #666; line-height: 1.6; border-top: 1px solid #eee; padding-top: 14px; margin-top: 4px; }

  .teachers-block { margin-top: 14px; padding-top: 14px; border-top: 1px solid #eee; }
  .teachers-block .section-label { margin-bottom: 10px; }
  .teacher-row { font-size: 13px; color: #444; padding: 4px 0; border-bottom: 1px solid #f5f5f5; display: flex; gap: 8px; }
  .teacher-row:last-child { border-bottom: none; }
  .teacher-name { font-weight: 500; color: #111; min-width: 160px; }
  .teacher-course { color: #888; font-size: 12px; }

  .reset-btn { margin-top: 16px; padding-top: 14px; border-top: 1px solid #eee; text-align: right; }
  .reset-btn button { background: none; border: none; font-size: 12px; color: #bbb; cursor: pointer; }
  .reset-btn button:hover { color: #E62429; }

  .loading { text-align: center; padding: 30px; color: #888; font-size: 14px; }
  .error-box { background: #FCEBEB; color: #791F1F; padding: 12px 16px; border-radius: 8px; font-size: 13px; }
</style>
</head>
<body>

<div class="widget">
  <div class="top-bar"></div>
  <div class="body">
    <div id="setup" style="display:none">
      <p class="setup-title">Canvas Student Widget</p>
      <p class="setup-sub">Enter your Canvas details once and the widget will remember them for this browser.</p>
      <div class="field">
        <label>Canvas URL</label>
        <input type="text" id="inp-url" placeholder="https://yourschool.instructure.com" />
        <p class="hint">Your school's Canvas address</p>
      </div>
      <div class="field">
        <label>API Token</label>
        <input type="password" id="inp-token" placeholder="Paste your Canvas API token here" />
        <p class="hint">Account &rarr; Settings &rarr; New Access Token</p>
      </div>
      <button class="btn-connect" id="btn-connect">Connect to Canvas</button>
      <div id="setup-error" style="display:none" class="setup-error"></div>
    </div>

    <div id="loading" class="loading" style="display:none">Loading your assignments...</div>
    <div id="content" style="display:none"></div>
  </div>
</div>

<script>
const PROXY = 'https://a-igrader-ten.vercel.app/api/canvas';

function fmt(d) {
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function shortCourse(name) {
  return name
    .replace(/^AAA-Master NCST\s*/i, '')
    .replace(/^Master\s*/i, '')
    .replace(/^[A-Z0-9]+:[A-Z0-9]+:NCST\s*/i, '')
    .trim();
}

function showSetup(errorMsg) {
  document.getElementById('setup').style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'none';
  if (errorMsg) {
    const el = document.getElementById('setup-error');
    el.textContent = errorMsg;
    el.style.display = 'block';
  }
}

async function loadData(token, baseUrl) {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';

  try {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, baseUrl })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const firstName = data.studentName.split(' ')[0];
    const start     = fmt(data.dateRange.start);
    const end       = fmt(data.dateRange.end);

    let missingHTML = '';
    if (!data.missing.length) {
      missingHTML = `<div class="item item-good"><span class="icon">&#10003;</span><div><p class="item-title">Nothing missing</p><p class="item-meta">Great work staying on top of things!</p></div></div>`;
    } else {
      data.missing.forEach(a => {
        missingHTML += `<div class="item item-missing"><span class="icon">&#9888;</span><div><p class="item-title">${a.name}</p><p class="item-meta">${shortCourse(a.courseName)} &nbsp;&middot;&nbsp; was due ${fmt(a.due_at)}</p></div></div>`;
      });
    }

    let upcomingHTML = '';
    if (!data.upcoming.length) {
      upcomingHTML = `<div class="item item-good"><span class="icon">&#10003;</span><div><p class="item-title">Nothing due in the next 14 days</p><p class="item-meta">Enjoy the break!</p></div></div>`;
    } else {
      data.upcoming.forEach(a => {
        upcomingHTML += `<div class="item item-upcoming"><span class="icon">&#8594;</span><div><p class="item-title">${a.name}</p><p class="item-meta">${shortCourse(a.courseName)} &nbsp;&middot;&nbsp; due ${fmt(a.due_at)}</p></div></div>`;
      });
    }

    const teachersHTML = data.teachers.map(t => `
      <div class="teacher-row">
        <span class="teacher-name">${t.name}</span>
        <span class="teacher-course">${shortCourse(t.course)}</span>
      </div>`).join('');

    document.getElementById('content').innerHTML = `
      <p class="greeting">Hello, ${firstName}!</p>
      <p class="subline">Your assignments &mdash; ${start} through ${end}</p>
      <div class="block">
        <p class="section-label">Assignments you missed</p>
        ${missingHTML}
      </div>
      <div class="block">
        <p class="section-label">Coming up soon</p>
        ${upcomingHTML}
      </div>
      ${data.missing.length ? `<p class="note">If you have questions about a missing assignment, reach out to your teacher as soon as possible &mdash; most are happy to work with you.</p>` : ''}
      <div class="teachers-block">
        <p class="section-label">Your teachers</p>
        ${teachersHTML}
      </div>
      <div class="reset-btn"><button onclick="resetWidget()">&#9881; Change account</button></div>
    `;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  } catch (err) {
    localStorage.removeItem('canvas_token');
    localStorage.removeItem('canvas_url');
    showSetup('Could not connect: ' + err.message + '. Please check your token and URL.');
  }
}

function resetWidget() {
  localStorage.removeItem('canvas_token');
  localStorage.removeItem('canvas_url');
  document.getElementById('setup-error').style.display = 'none';
  document.getElementById('inp-token').value = '';
  document.getElementById('inp-url').value = '';
  showSetup();
}

document.getElementById('btn-connect').addEventListener('click', async () => {
  const token   = document.getElementById('inp-token').value.trim();
  const baseUrl = document.getElementById('inp-url').value.trim();
  if (!token || !baseUrl) {
    document.getElementById('setup-error').textContent = 'Please enter both a Canvas URL and an API token.';
    document.getElementById('setup-error').style.display = 'block';
    return;
  }
  localStorage.setItem('canvas_token', token);
  localStorage.setItem('canvas_url', baseUrl);
  await loadData(token, baseUrl);
});

(function init() {
  const token   = localStorage.getItem('canvas_token');
  const baseUrl = localStorage.getItem('canvas_url');
  if (token && baseUrl) {
    loadData(token, baseUrl);
  } else {
    showSetup();
  }
})();
</script>
</body>
</html>
